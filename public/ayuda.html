<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sagason - Ayuda</title>
    <style>
        :root {
            --primary: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --text-dim: #94a3b8; --border: #334155; --success: #10b981;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        header {
            background: rgba(15, 23, 42, 0.95); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .btn-close { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; text-decoration: none; }

        .container { max-width: 480px; margin: 0 auto; padding: 20px 15px 100px 15px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 18px; text-align: center; margin: 0 0 20px 0; color: var(--text); }
        
        .found-info { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 25px; border-left: 4px solid var(--primary); text-align: center; }
        .found-info span { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .found-info b { font-size: 18px; color: var(--primary); }

        label { display: block; margin-top: 15px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; margin-top: 6px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }
        
        .btn-submit { width: 100%; padding: 14px; margin-top: 25px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; background: var(--success); color: white; font-size: 15px; }
        .btn-gps { width: 100%; padding: 12px; margin-top: 15px; background: transparent; border: 1px solid var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-gps.active { background: var(--primary); color: white; }

        /* ESTILO MENSAJE FINAL */
        .thanks-box { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); padding: 20px; border-radius: 15px; line-height: 1.6; margin: 20px 0; font-size: 15px; text-align: center; }
    </style>
</head>
<body>

<header>
    <img src="logo-chico.png" height="28" onerror="this.src='https://sagason.cl/images/logo.png'">
    <button onclick="location.href='https://sagason.cl'" class="btn-close">Cerrar</button>
</header>

<div class="container" id="app">
    <div id="loading-screen" style="text-align:center; padding:50px; color:var(--text-dim);">Conectando con Sagason...</div>

    <div class="card" id="main-card" style="display: none;">
        <h2>¡Gracias por ayudar!</h2>
        <div class="found-info">
            <span>Has encontrado a:</span>
            <b id="display-nickname">---</b>
            <span id="display-category" style="margin-top:5px; font-size:11px;">---</span>
        </div>

        <form id="reportForm">
            <label>Tu Nombre:</label>
            <input type="text" id="informant-name" required placeholder="Ej: Juan Pérez">
            <label>Tu Teléfono:</label>
            <input type="tel" id="informant-phone" required placeholder="Ej: +569 1234 5678">
            <label id="label-desc">Descripción / Lugar:</label>
            <textarea id="informant-msg" rows="3" required placeholder="¿Cómo está y dónde se encuentra?"></textarea>

            <button type="button" class="btn-gps" id="btn-gps">📍 Compartir mi Ubicación GPS</button>
            <button type="submit" class="btn-submit" id="btn-submit">Enviar Reporte al Dueño</button>
        </form>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const tagId = urlParams.get('id');
    let coords = null;
    let customThanksMsg = "";

    async function init() {
        if (!tagId) { document.getElementById('loading-screen').innerHTML = "ID no válido."; return; }
        try {
            const response = await fetch(`https://k.sagason.cl/scan?id=${tagId}`);
            const data = await response.json();
            if (response.ok) {
                document.getElementById('display-nickname').innerText = data.nickname;
                document.getElementById('display-category').innerText = data.category;
                customThanksMsg = data.thanks_msg;
                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('main-card').style.display = "block";
            } else { document.getElementById('loading-screen').innerHTML = "Placa no activa."; }
        } catch (e) { document.getElementById('loading-screen').innerText = "Error de red."; }
    }

    document.getElementById('btn-gps').onclick = () => {
        const btn = document.getElementById('btn-gps');
        btn.innerText = "Obteniendo...";
        navigator.geolocation.getCurrentPosition((pos) => {
            coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            btn.innerText = "✅ Ubicación Capturada";
            btn.classList.add('active');
        }, () => { alert("Activa el GPS de tu celular."); btn.innerText = "📍 Reintentar GPS"; });
    };

    document.getElementById('reportForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.disabled = true; btn.innerText = "Enviando...";
        try {
            const res = await fetch('https://k.sagason.cl/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tagId, name: document.getElementById('informant-name').value, phone: document.getElementById('informant-phone').value, message: document.getElementById('informant-msg').value, location: coords })
            });

            if (res.ok) {
                let finalMsg = customThanksMsg || "Gracias por encontrar mi pertenencia. Me comunicaré contigo de inmediato.";
                document.getElementById('app').innerHTML = `
                    <div class="card" style="text-align:center;">
                        <h2 style="color:var(--success);">✅ ¡Reporte Enviado!</h2>
                        <div class="thanks-box">${finalMsg}</div>
                        <p style="color:var(--text-dim); font-size:13px;">El propietario ha sido notificado.</p>
                        <button onclick="location.href='https://sagason.cl'" class="btn-submit" style="background:var(--primary);">Finalizar</button>
                    </div>
                `;
            } else {
                alert("Error al enviar. Intenta de nuevo.");
                btn.disabled = false;
                btn.innerText = "Enviar Reporte al Dueño";
            }
        } catch (e) { alert("Error de red."); btn.disabled = false; btn.innerText = "Enviar Reporte al Dueño"; }
    };
    init();
</script>
</body>
</html>
