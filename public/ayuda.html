<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sagason - Sistema de Ayuda</title>
    <style>
        :root {
            --primary: #0ea5e9; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background: rgba(15, 23, 42, 0.95);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 15px 80px 15px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 20px; text-align: center; margin-top: 0; color: var(--text); }
        
        /* INFO DEL TAG ENCONTRADO */
        .found-info {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary);
            text-align: center;
        }
        .found-info span { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .found-info b { font-size: 18px; color: var(--primary); }

        /* FORMULARIO */
        label { display: block; margin-top: 15px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }

        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-gps { background: #334155; color: var(--primary); border: 1px solid var(--primary); margin-top: 15px; }
        .btn-gps.active { background: var(--primary); color: white; }
        
        .btn-submit { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        #loading-screen { text-align: center; padding: 50px; color: var(--text-dim); }
        
        /* ESTILO MENSAJE FINAL */
        .thanks-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            padding: 20px;
            border-radius: 15px;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <img src="logo-chico.png" height="35" onerror="this.src='https://sagason.cl/images/logo.png'">
</header>

<div class="container" id="app">
    <!-- Pantalla de Carga Inicial -->
    <div id="loading-screen">
        <p>Estableciendo conexión segura...</p>
    </div>

    <!-- Formulario Principal -->
    <div class="card" id="main-card" style="display: none;">
        <h2>¡Gracias por ayudar!</h2>
        
        <div class="found-info">
            <span>Has encontrado a:</span>
            <b id="display-nickname">---</b>
            <span id="display-category" style="margin-top:5px;">---</span>
        </div>

        <form id="reportForm">
            <label>Tu Nombre:</label>
            <input type="text" id="informant-name" required placeholder="Ej: Juan Pérez">

            <label>Tu Teléfono de contacto:</label>
            <input type="tel" id="informant-phone" required placeholder="Ej: +569 1234 5678">

            <label id="label-desc">Descripción del hallazgo:</label>
            <textarea id="informant-msg" rows="3" required placeholder="¿Cómo está y dónde se encuentra?"></textarea>

            <button type="button" class="btn btn-gps" id="btn-gps">📍 Compartir mi Ubicación Exacta</button>
            <p id="gps-status" style="font-size:11px; color:var(--text-dim); text-align:center; margin-top:5px;">Opcional pero ayuda mucho al rescate</p>

            <button type="submit" class="btn btn-submit" id="btn-submit">Enviar Reporte al Dueño</button>
        </form>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const tagId = urlParams.get('id');
    let coords = null;
    let customThanksMsg = "";

    async function init() {
        if (!tagId) { 
            document.getElementById('loading-screen').innerHTML = "<h2>Error</h2><p>ID de placa no válido.</p>"; 
            return; 
        }

        try {
            const response = await fetch(`https://k.sagason.cl/scan?id=${tagId}`);
            const data = await response.json();

            if (response.ok) {
                document.getElementById('display-nickname').innerText = data.nickname;
                document.getElementById('display-category').innerText = data.category;
                customThanksMsg = data.thanks_msg;

                // Personalizar descripción según categoría
                if (data.category === "Personas") {
                    document.getElementById('label-desc').innerText = "Estado de salud / Punto exacto:";
                } else if (data.category === "Equipos") {
                    document.getElementById('label-desc').innerText = "Estado del equipo / Lugar del hallazgo:";
                }

                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('main-card').style.display = "block";
            } else {
                document.getElementById('loading-screen').innerHTML = "<h2>Aviso</h2><p>Esta placa no está activa o no existe.</p>";
            }
        } catch (e) {
            document.getElementById('loading-screen').innerText = "Error de conexión con AWS.";
        }
    }

    // Manejar GPS
    document.getElementById('btn-gps').onclick = () => {
        const btn = document.getElementById('btn-gps');
        const status = document.getElementById('gps-status');
        btn.innerText = "Obteniendo ubicación...";
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                btn.innerText = "✅ Ubicación Capturada";
                btn.classList.add('active');
                status.innerText = "Ubicación compartida con éxito.";
                status.style.color = "var(--success)";
            },
            (err) => { 
                alert("No pudimos obtener el GPS. Por favor describe el lugar en el texto."); 
                btn.innerText = "📍 Compartir mi Ubicación Exacta";
                status.innerText = "GPS no capturado. Inténtalo de nuevo o ignora.";
            }
        );
    };

    // Enviar Reporte
    document.getElementById('reportForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerText = "Enviando Reporte...";

        const payload = {
            tagId: tagId,
            name: document.getElementById('informant-name').value,
            phone: document.getElementById('informant-phone').value,
            message: document.getElementById('informant-msg').value,
            location: coords
        };

        try {
            const response = await fetch('https://k.sagason.cl/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // Lógica de mensaje de agradecimiento
                let finalMsg = customThanksMsg;
                if (!finalMsg) {
                    const cat = document.getElementById('display-category').innerText;
                    if (cat === "Mascotas") finalMsg = "¡Muchas gracias por encontrar a mi mascota! Por favor, cuídala mientras me comunico contigo. Estaré allí lo antes posible.";
                    else if (cat === "Personas") finalMsg = "Muchas gracias por tu ayuda. Por favor, mantente cerca de la persona y asegúrate de que esté segura hasta que podamos llegar.";
                    else finalMsg = "Gracias por encontrar mi pertenencia. Por favor, mantenla resguardada en un lugar seguro. Me comunicaré contigo de inmediato.";
                }

                document.getElementById('app').innerHTML = `
                    <div class="card" style="text-align:center;">
                        <h2 style="color:var(--success);">✅ ¡Reporte Enviado!</h2>
                        <div class="thanks-box">
                            ${finalMsg}
                        </div>
                        <p style="color:var(--text-dim); margin-top:20px; font-size:13px;">
                            El propietario ha recibido tus datos y se pondrá en contacto contigo a la brevedad.
                        </p>
                    </div>
                `;
            } else {
                alert("Error al enviar. Intenta nuevamente.");
                btn.disabled = false;
                btn.innerText = "Enviar Reporte al Dueño";
            }
        } catch (e) {
            alert("Error de red.");
            btn.disabled = false;
            btn.innerText = "Enviar Reporte al Dueño";
        }
    };

    init();
</script>
</body>
</html>
