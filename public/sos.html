<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Alerta de Emergencia Médica — Sagason</title>

    <style>
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-secondary: #d1d5db;
            --primary-color: #ef4444;
            --primary-hover: #dc2626;
            --success-color: #34d399;
            --error-color: #f87171;
            --info-color: #60a5fa;
            --border-color: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--bg-card);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: rgba(239, 68, 68, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            border: 2px solid var(--primary-color);
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: var(--primary-color);
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 16px;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        p.description {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 32px;
            color: var(--text-secondary);
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .btn:disabled {
            background-color: #7f1d1d;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #status-message {
            margin-top: 24px;
            font-weight: 500;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            line-height: 1.4;
        }

        .status-content {
            padding: 12px 16px;
            border-radius: 8px;
            width: 100%;
        }

        .success .status-content {
            background-color: rgba(52, 211, 153, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .error .status-content {
            background-color: rgba(248, 113, 113, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .info .status-content {
            background-color: rgba(96, 165, 250, 0.1);
            color: var(--info-color);
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        .spinner {
            animation: spin 1s linear infinite;
            width: 20px;
            height: 20px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>

    <h1>Emergencia Médica</h1>
    <p class="description">Has encontrado a alguien que necesita ayuda. Al pulsar el botón, enviarás tu ubicación actual y una alerta de emergencia a su familia de forma totalmente anónima.</p>

    <button id="btn-alerta" class="btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        Enviar Alerta
    </button>

    <div id="status-message"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const btnAlerta = document.getElementById('btn-alerta');
        const statusMessage = document.getElementById('status-message');
        const originalBtnHTML = btnAlerta.innerHTML;

        // Leer parámetros de la URL: ?id=SAG-001&mail=email@ejemplo.com
        const params = new URLSearchParams(window.location.search);
        const plateId = params.get('id') || params.get('uid') || 'ID_NO_ESPECIFICADO';
        const destinationEmail = params.get('mail') || params.get('email') || '';

        const ENDPOINT = "https://alerta-sos-sagason.brluson.workers.dev";

        function setStatus(message, type) {
            statusMessage.innerHTML = `<div class="status-content">${message}</div>`;
            statusMessage.className = type;
        }

        function clearStatus() {
            statusMessage.innerHTML = '';
            statusMessage.className = '';
        }

        const spinnerHTML = `
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity:0.25"></circle>
                <path fill="currentColor" style="opacity:0.75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        `;

        async function sendAlert(lat, lon) {
            const payload = {
                plateId: plateId,
                destinationEmail: destinationEmail,
                lat: lat,
                lon: lon,
                timestamp: new Date().toISOString()
            };

            try {
                setStatus('Ubicación obtenida. Enviando alerta...', 'info');
                btnAlerta.innerHTML = spinnerHTML + ' Enviando...';

                const res = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }, // ← CLAVE: sin esto el worker da 400
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    setStatus('✅ Alerta enviada correctamente. ¡Muchas gracias por tu ayuda!', 'success');
                    btnAlerta.style.display = 'none';
                } else {
                    throw new Error(data.error || `Error del servidor: ${res.status}`);
                }
            } catch (e) {
                console.error('Error al enviar alerta:', e);
                setStatus(`❌ No se pudo enviar la alerta. Por favor llame al 131.<br><small>${e.message}</small>`, 'error');
                btnAlerta.disabled = false;
                btnAlerta.innerHTML = originalBtnHTML;
            }
        }

        btnAlerta.addEventListener('click', () => {
            clearStatus();
            btnAlerta.disabled = true;
            btnAlerta.innerHTML = spinnerHTML + ' Obteniendo ubicación...';
            setStatus('Por favor, autorice el acceso a la ubicación en su dispositivo...', 'info');

            if (!navigator.geolocation) {
                setStatus('❌ Tu navegador no soporta geolocalización. Por favor llame al 131.', 'error');
                btnAlerta.disabled = false;
                btnAlerta.innerHTML = originalBtnHTML;
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    sendAlert(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    let errMsg = '❌ Ocurrió un error al obtener la ubicación.';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errMsg = '❌ Se denegó el permiso de ubicación. Es necesario para alertar a la familia.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errMsg = '❌ No se pudo determinar tu ubicación en este momento.';
                            break;
                        case error.TIMEOUT:
                            errMsg = '❌ El dispositivo tardó demasiado en responder. Intenta nuevamente.';
                            break;
                    }
                    setStatus(errMsg, 'error');
                    btnAlerta.disabled = false;
                    btnAlerta.innerHTML = originalBtnHTML;
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });
    });
</script>
</body>
</html>
