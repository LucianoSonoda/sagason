<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sagason - Dashboard</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: rgba(15, 23, 42, 0.95); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .btn-close { background: transparent; border: 1px solid var(--border); color: #94a3b8; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px 15px 100px 15px; }
        .tabs { display: flex; background: var(--card); padding: 4px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: #94a3b8; font-weight: 600; cursor: pointer; border-radius: 8px; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; } .content-section.active { display: block; }
        .tag-item { background: #0f172a; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .tag-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .tag-name { font-weight: 600; font-size: 15px; }
        .tag-sub { font-size: 10px; color: #94a3b8; font-family: monospace; display: block; margin-top: 2px; }
        .arrow { font-size: 10px; transition: 0.3s; color: var(--primary); }
        .arrow.up { transform: rotate(180deg); }
        .edit-panel { padding: 15px; background: #1e293b; border-top: 1px solid var(--border); display: none; }
        label { display: block; margin-top: 12px; font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 14px; box-sizing: border-box; }
        input:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-action { width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn-save { background: #10b981; color: white; }
        .btn-confirm { background: var(--primary); color: white; }
        .badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; border: 1px solid currentColor; margin-left: 5px; }
    </style>
</head>
<body>

<header>
    <img src="logo-chico.png" height="28" onerror="this.src='https://sagason.cl/images/logo.png'">
    <button onclick="logout()" class="btn-close">Cerrar</button>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-list" onclick="showTab('list')">Mis Placas</button>
        <button class="tab-btn" id="btn-activate" onclick="showTab('activate')">Activar Nueva</button>
    </div>

    <div class="content-section active" id="section-list">
        <div id="tags-list-container">
            <p style="text-align:center; color:#475569; font-size: 13px;">Cargando placas...</p>
        </div>
    </div>

    <div class="content-section" id="section-activate">
        <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--border);">
            <h3 style="margin:0 0 15px 0; font-size:16px;">Vincular Producto</h3>
            <label>ID de la Placa:</label>
            <input type="text" id="new-tag-id" placeholder="EJ: 2UCAYZL" style="text-transform:uppercase; font-weight:bold;">
            <label>Nombre Identificador:</label>
            <input type="text" id="new-tag-nickname" placeholder="Ej: Mi Perro Bobby">
            <label>Categoría:</label>
            <select id="new-tag-category">
                <option value="Mascotas">Mascota</option>
                <option value="Personas">Persona</option>
                <option value="Equipos">Equipo</option>
            </select>
            <button class="btn-action btn-confirm" onclick="registerTag()">Activar Ahora</button>
        </div>
    </div>
</div>

<script>
    const API = "https://k.sagason.cl";
    let ownerId = null;
    let userEmail = "";

    function showTab(n) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`section-${n}`).classList.add('active');
        document.getElementById(`btn-${n}`).classList.add('active');
    }

    async function init() {
        const hash = new URLSearchParams(window.location.hash.substring(1));
        const token = hash.get('id_token') || localStorage.getItem('sagason_token');
        if (!token) { window.location.href = "https://sa-east-1oldgkh5dt.auth.sa-east-1.amazoncognito.com/login?client_id=21upf33c48gca702vfdrf9aqji&response_type=token&scope=email+openid+phone+profile&redirect_uri=https://sagason.cl/dashboard"; return; }
        localStorage.setItem('sagason_token', token);
        const user = JSON.parse(window.atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        ownerId = user.sub; userEmail = user.email;
        loadTags();
    }

    async function loadTags() {
        const res = await fetch(`${API}/user-tags?ownerId=${ownerId}`);
        const tags = await res.json();
        const cont = document.getElementById('tags-list-container');
        
        if (tags.length === 0) {
            cont.innerHTML = "<p style='text-align:center; color:#475569; padding:20px;'>No tienes placas registradas.</p>";
            return;
        }

        cont.innerHTML = tags.map(t => {
            const tier = t.tier || "Free";
            const limit = tier === "Advanced" ? 150 : (tier === "Basic" ? 50 : 12);
            const canWA = tier !== "Free";
            const isAdv = tier === "Advanced";
            const progress = Math.min(100, Math.round((t.scan_count || 0) / limit * 100));

            return `
            <div class="tag-item">
                <div class="tag-header" onclick="toggleEdit('${t.tagId}')">
                    <div>
                        <span class="tag-name">${t.nickname}</span>
                        <span class="tag-sub">${t.tagId} • ${tier}</span>
                    </div>
                    <span class="arrow" id="arrow-${t.tagId}">▼</span>
                </div>
                <div class="edit-panel" id="edit-${t.tagId}">
                    <label>Categoría:</label>
                    <select id="cat-${t.tagId}">
                        <option value="Mascotas" ${t.category === 'Mascotas' ? 'selected' : ''}>Mascota</option>
                        <option value="Personas" ${t.category === 'Personas' ? 'selected' : ''}>Persona</option>
                        <option value="Equipos" ${t.category === 'Equipos' ? 'selected' : ''}>Equipo</option>
                    </select>

                    <label>Emails de Notificación:</label>
                    <input type="email" id="e1-${t.tagId}" value="${t.email_1 || userEmail}" placeholder="Email 1">
                    <input type="email" id="e2-${t.tagId}" value="${t.email_2 || ''}" placeholder="Email 2 (Plan Advanced)" ${isAdv ? '' : 'disabled'}>
                    <input type="email" id="e3-${t.tagId}" value="${t.email_3 || ''}" placeholder="Email 3 (Plan Advanced)" ${isAdv ? '' : 'disabled'}>
                    
                    <label>Teléfonos (+569...):</label>
                    <input type="tel" id="p1-${t.tagId}" value="${t.phone_1 || ''}" placeholder="Teléfono 1 (Plan Basic)" ${canWA ? '' : 'disabled'}>
                    <input type="tel" id="p2-${t.tagId}" value="${t.phone_2 || ''}" placeholder="Teléfono 2 (Plan Advanced)" ${isAdv ? '' : 'disabled'}>
                    <input type="tel" id="p3-${t.tagId}" value="${t.phone_3 || ''}" placeholder="Teléfono 3 (Plan Advanced)" ${isAdv ? '' : 'disabled'}>
                    
                    <label>Mensaje Agradecimiento:</label>
                    <textarea id="msg-${t.tagId}" rows="2" placeholder="Mensaje para quien lo encuentre...">${t.thanks_msg || ''}</textarea>
                    
                    <div style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:9px; color:#94a3b8;">CONSUMO ANUAL: ${t.scan_count || 0} / ${limit}</span>
                        </div>
                        <div style="width:100%; height:4px; background:#0f172a; border-radius:10px; margin-top:5px;">
                            <div style="width:${progress}%; height:100%; background:${progress > 80 ? '#ef4444' : '#0ea5e9'}; border-radius:10px;"></div>
                        </div>
                    </div>

                    <button class="btn-action btn-save" onclick="updateTag('${t.tagId}', '${t.nickname}')">Guardar Cambios</button>
                    <div style="text-align:center; margin-top:15px;"><a href="https://sagason.cl/t/${t.tagId}" target="_blank" style="color:var(--primary); font-size:11px; text-decoration:none;">🔗 Probar Escaneo</a></div>
                </div>
            </div>`;
        }).join('');
    }

    function toggleEdit(id) {
        const area = document.getElementById(`edit-${id}`);
        const arrow = document.getElementById(`arrow-${id}`);
        const isVisible = area.style.display === "block";
        document.querySelectorAll('.edit-panel').forEach(a => a.style.display = "none");
        document.querySelectorAll('.arrow').forEach(a => a.classList.remove('up'));
        if (!isVisible) { area.style.display = "block"; arrow.classList.add('up'); }
    }

    async function updateTag(tagId, nickname) {
        const payload = {
            ownerId, tagId, nickname,
            category: document.getElementById(`cat-${tagId}`).value,
            email_1: document.getElementById(`e1-${tagId}`).value,
            email_2: document.getElementById(`e2-${tagId}`).value,
            email_3: document.getElementById(`e3-${tagId}`).value,
            phone_1: document.getElementById(`p1-${tagId}`).value,
            phone_2: document.getElementById(`p2-${tagId}`).value,
            phone_3: document.getElementById(`p3-${tagId}`).value,
            thanks_msg: document.getElementById(`msg-${tagId}`).value
        };
        const res = await fetch(`${API}/user-tags`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        if (res.ok) { alert("✅ Cambios guardados."); loadTags(); }
        else alert("Error al guardar.");
    }

    async function registerTag() {
        const tagId = document.getElementById('new-tag-id').value.toUpperCase().trim();
        const nickname = document.getElementById('new-tag-nickname').value.trim();
        const category = document.getElementById('new-tag-category').value;
        if (!tagId || !nickname) return alert("Faltan datos");
        const res = await fetch(`${API}/user-tags`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ownerId, tagId, nickname, category, email_1: userEmail }) });
        if (res.ok) { alert("¡Éxito!"); location.reload(); } else { const err = await res.json(); alert("❌ ID No existe en fábrica."); }
    }

    function logout() { localStorage.removeItem('sagason_token'); location.href="https://sagason.cl"; }
    init();
</script>
</body>
</html>
