<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sagason - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: rgba(15, 23, 42, 0.95); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px 15px 100px 15px; }
        .tabs { display: flex; background: var(--card); padding: 4px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: #94a3b8; font-weight: 600; cursor: pointer; border-radius: 8px; font-size: 11px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; } .content-section.active { display: block; }
        .tag-item { background: #0f172a; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .tag-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .tag-name { font-weight: 600; font-size: 15px; }
        .tag-sub { font-size: 10px; color: #94a3b8; font-family: monospace; display: block; margin-top: 2px; }
        .arrow { font-size: 10px; transition: 0.3s; color: var(--primary); }
        .arrow.up { transform: rotate(180deg); }
        .edit-panel { padding: 15px; background: #1e293b; border-top: 1px solid var(--border); display: none; }
        label { display: block; margin-top: 12px; font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 11px; margin-top: 5px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 14px; box-sizing: border-box; }
        input:disabled { opacity: 0.2; }
        .btn-action { width: 100%; padding: 13px; margin-top: 20px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-save { background: #10b981; color: white; }
        .btn-upgrade { background: #3b82f6; color: white; font-size: 11px; padding: 10px; margin-top: 10px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-upgrade:hover { opacity: 0.9; transform: translateY(-1px); }
        .admin-box { border: 1px dashed var(--primary); padding: 15px; border-radius: 12px; background: rgba(14, 165, 233, 0.05); }
    </style>
</head>
<body>

<header>
    <a href="https://sagason.cl" style="display:flex; align-items:center;"><img src="logo-chico.png" height="28" onerror="this.src='https://sagason.cl/images/logo.png'"></a>
    <div style="display: flex; align-items: center; gap: 12px;">
        <span style="color: #64748b; font-size: 11px; font-weight: bold;">v1.2 (Flow)</span>
        <button onclick="logout()" style="background:none; border:1px solid var(--border); color:white; padding:5px 10px; border-radius:8px; font-size:11px; cursor:pointer;">Cerrar Sesión</button>
    </div>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-list" onclick="showTab('list')">Mis Placas</button>
        <button class="tab-btn" id="btn-activate" onclick="showTab('activate')">Activar Nueva</button>
        <button class="tab-btn" id="btn-admin" onclick="showTab('admin')" style="display:none;">FÁBRICA</button>
    </div>

    <!-- LISTADO -->
    <div class="content-section active" id="section-list">
        <div id="tags-list-container"><p style="text-align:center; color:#475569; padding:40px;">Cargando tus placas...</p></div>
    </div>

    <!-- ACTIVACIÓN -->
    <div class="content-section" id="section-activate">
        <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--border);">
            <h3 style="margin:0 0 15px 0; font-size:16px;">Vincular Placa</h3>
            <label>ID de la Placa:</label>
            <input type="text" id="new-tag-id" placeholder="xxxx-xxxx-xxxx-xxxx" style="text-transform:uppercase; font-family:monospace;">
            <label>Código de Activación (PIN):</label>
            <input type="text" id="new-tag-pin" placeholder="Ingresa el PIN asignado" style="text-transform:uppercase; font-family:monospace;">
            <label>Nombre:</label>
            <input type="text" id="new-tag-nickname" placeholder="Ej: Mi Perro Bobby">
            <label>Categoría Inicial:</label>
            <select id="new-tag-category">
                <option value="Mascotas">Mascota</option>
                <option value="Personas">Persona</option>
                <option value="Equipos">Equipo</option>
            </select>
            <button class="btn-action" style="background:var(--primary); color:white;" onclick="registerTag()">Activar Ahora</button>
        </div>
    </div>

    <!-- FÁBRICA -->
    <div class="content-section" id="section-admin">
        <div class="admin-box">
            <h3 style="margin:0 0 10px 0; font-size:16px;">Generador SAGASON 4K</h3>
            <label>Referencia Archivo (Ej. Lote_01):</label>
            <input type="text" id="admin-nick" placeholder="Ej: Lote_01">
            <label>Cantidad a Generar:</label>
            <input type="number" id="admin-amount" value="1" min="1" max="100">
            <button class="btn-action" id="btn-admin-generate" style="background:var(--primary); color:white;" onclick="adminCreateBatch()">Generar IDs, QRs y Códigos</button>
            <div id="qr-result" style="margin-top:20px; padding:15px; background:white; border-radius:12px; text-align:center; display:none; color:#333;">
                <div id="qrs-container" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center; margin-bottom:15px;"></div>
                <button onclick="downloadAllQRs()" style="background:#0f172a; color:white; width:100%; padding:10px; border-radius:8px; border:none; cursor:pointer; font-weight:bold;">📥 Descargar Lote (.zip)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://s4k.sagason.cl";
    let ownerId = null; let userEmail = "";

    function showTab(n) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`section-${n}`).classList.add('active');
        document.getElementById(`btn-${n}`).classList.add('active');
    }

    async function init() {
        const hash = new URLSearchParams(window.location.hash.substring(1));
        const token = hash.get('id_token') || localStorage.getItem('sagason_token');
        if (!token) { window.location.href = "https://sa-east-1oldgkh5dt.auth.sa-east-1.amazoncognito.com/login?client_id=21upf33c48gca702vfdrf9aqji&response_type=token&scope=email+openid+phone+profile&redirect_uri=https://sagason.cl/dashboard"; return; }
        localStorage.setItem('sagason_token', token);
        const user = JSON.parse(window.atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        ownerId = user.sub; userEmail = user.email;
        if (userEmail === "brluson@gmail.com") document.getElementById('btn-admin').style.display = "block";
        loadTags();
    }

    async function loadTags() {
        const res = await fetch(`${API}/user-tags?ownerId=${ownerId}`);
        const tags = await res.json();
        const cont = document.getElementById('tags-list-container');
        if (!tags || tags.length === 0) { cont.innerHTML = "<p style='text-align:center; padding:20px;'>No tienes placas registradas.</p>"; return; }
        
        const now = new Date();
        // 1. Pre-computar el estado real de cada placa antes de dibujar
        tags.forEach(t => {
            let tier = t.tier || "Free";
            let finalExpire = null;

            if (t.expire_date) {
                finalExpire = new Date(t.expire_date);
            } else if (t.last_pay && tier !== "Free") {
                finalExpire = new Date(t.last_pay);
                finalExpire.setFullYear(finalExpire.getFullYear() + 1);
            }

            if (finalExpire && now > finalExpire) {
                tier = "Free";
            }
            
            t.computedTier = tier;
            t.finalExpire = finalExpire;
        });

        // 2. Dibujar placas
        cont.innerHTML = tags.map(t => {
            const tier = t.computedTier;
            const finalExpire = t.finalExpire;
            const isAdv = tier === "Advanced";
            const canWA = tier !== "Free";

            // Contar cuántas OTRAS placas (activas) tienen plan Advanced
            const otherAdvCount = tags.filter(other => other.tagId !== t.tagId && other.computedTier === "Advanced").length;
            
            // Lógica escalonada: 5% por placa extra, tope 15% (equivalente a cobrar mínimo $12.750)
            const discountPct = Math.min(15, otherAdvCount * 5);
            const advPrice = 15000 * (1 - (discountPct / 100));
            const advText = discountPct > 0 ? `PROMO -${discountPct}% ($${advPrice.toLocaleString('es-CL')})` : `($15.000)`;

            const limit = tier === "Advanced" ? 60 : (tier === "Basic" ? 30 : 5);
            const progress = Math.min(100, Math.round((t.scan_count || 0) / limit * 100));

            let expireText = "";
            if (tier !== "Free" && finalExpire) {
                expireText = ` • Vence: ${finalExpire.toLocaleDateString('es-CL')}`;
            }

            let upgradeHTML = "";
            
            const btnStyle = "padding:8px 0; font-size:11px;";

            if(tier === "Free") {
                upgradeHTML = `
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <button onclick="payRAKA('${t.tagId}', 'Basic', 7000, 'flow')" class="btn-upgrade" style="flex:1; ${btnStyle}">🚀 Basic ($7.000) Flow</button>
                        <button onclick="payRAKA('${t.tagId}', 'Basic', 7000, 'mp')" class="btn-upgrade" style="flex:1; background:#009ee3; ${btnStyle}">🚀 Basic ($7.000) MP</button>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="payRAKA('${t.tagId}', 'Advanced', ${advPrice}, 'flow')" class="btn-upgrade" style="flex:1; background:var(--success); ${btnStyle}">💎 Advanced ${advText} Flow</button>
                        <button onclick="payRAKA('${t.tagId}', 'Advanced', ${advPrice}, 'mp')" class="btn-upgrade" style="flex:1; background:#009ee3; ${btnStyle}">💎 Advanced ${advText} MP</button>
                    </div>
                `;
            } else if(tier === "Basic") {
                upgradeHTML = `
                    <div style="display:flex; gap:5px;">
                        <button onclick="payRAKA('${t.tagId}', 'Advanced', ${advPrice}, 'flow')" class="btn-upgrade" style="flex:1; background:var(--success); ${btnStyle}">💎 Mejorar Advanced ${advText} Flow</button>
                        <button onclick="payRAKA('${t.tagId}', 'Advanced', ${advPrice}, 'mp')" class="btn-upgrade" style="flex:1; background:#009ee3; ${btnStyle}">💎 Mejorar Advanced ${advText} MP</button>
                    </div>
                `;
            }
            
            if(progress >= 80 && tier === "Basic") {
                upgradeHTML += `
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <button onclick="payRAKA('${t.tagId}', 'Basic', 7000, 'flow')" class="btn-upgrade" style="flex:1; background:#ef4444; ${btnStyle}">⚠️ Renovar ($7.000) Flow</button>
                        <button onclick="payRAKA('${t.tagId}', 'Basic', 7000, 'mp')" class="btn-upgrade" style="flex:1; background:#009ee3; ${btnStyle}">⚠️ Renovar ($7.000) MP</button>
                    </div>
                `;
            }
            
            if(progress >= 80 && tier === "Advanced") {
                upgradeHTML += `
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <button onclick="payRAKA('${t.tagId}', 'Advanced', ${advPrice}, 'flow')" class="btn-upgrade" style="flex:1; background:#ef4444; ${btnStyle}">⚠️ Renovar ${advText} Flow</button>
                        <button onclick="payRAKA('${t.tagId}', 'Advanced', ${advPrice}, 'mp')" class="btn-upgrade" style="flex:1; background:#009ee3; ${btnStyle}">⚠️ Renovar ${advText} MP</button>
                    </div>
                `;
            }

            return `
            <div class="tag-item">
                <div class="tag-header" onclick="toggleEdit('${t.tagId}')">
                    <div><span class="tag-name">${t.nickname}</span><span class="tag-sub">${t.tagId} • ${tier}${expireText}</span></div>
                    <span class="arrow" id="arrow-${t.tagId}">▼</span>
                </div>
                <div class="edit-panel" id="edit-${t.tagId}">
                    <div style="background:rgba(0,0,0,0.2); padding:12px; border-radius:12px; margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; font-size:10px; color:#94a3b8; font-weight:bold;">
                            <span>CONSUMO ANUAL</span><span>${t.scan_count||0} / ${limit}</span>
                        </div>
                        <div style="width:100%; height:6px; background:#0f172a; border-radius:10px; margin-top:6px; overflow:hidden;">
                            <div style="width:${progress}%; height:100%; background:${progress>80?'#ef4444':'#0ea5e9'}; border-radius:10px; transition:0.3s;"></div>
                        </div>
                        ${upgradeHTML}
                    </div>
                    <label>Nombre:</label><input type="text" id="nick-${t.tagId}" value="${t.nickname}">
                    <label>Categoría:</label>
                    <select id="cat-${t.tagId}">
                        <option value="Mascotas" ${t.category==='Mascotas'?'selected':''}>Mascota</option>
                        <option value="Personas" ${t.category==='Personas'?'selected':''}>Persona</option>
                        <option value="Equipos" ${t.category==='Equipos'?'selected':''}>Equipo</option>
                    </select>
                    <label>Emails Notificación:</label>
                    <input type="email" id="e1-${t.tagId}" value="${t.email_1 || userEmail}">
                    <input type="email" id="e2-${t.tagId}" value="${t.email_2 || ''}" placeholder="Solo Advanced" ${isAdv?'':'disabled'}>
                    <input type="email" id="e3-${t.tagId}" value="${t.email_3 || ''}" placeholder="Solo Advanced" ${isAdv?'':'disabled'}>
                    <label>Teléfonos (+569...):</label>
                    <input type="tel" id="p1-${t.tagId}" value="${t.phone_1 || ''}" placeholder="Plan Basic+" ${canWA?'':'disabled'}>
                    <input type="tel" id="p2-${t.tagId}" value="${t.phone_2 || ''}" placeholder="Solo Advanced" ${isAdv?'':'disabled'}>
                    <input type="tel" id="p3-${t.tagId}" value="${t.phone_3 || ''}" placeholder="Solo Advanced" ${isAdv?'':'disabled'}>
                    <label>Agradecimiento:</label><textarea id="msg-${t.tagId}" rows="2">${t.thanks_msg || ''}</textarea>
                    
                    <label style="margin-top:10px;">Alertas (Ahorro de escaneos):</label>
                    <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:15px; font-size:13px; margin-top:5px;">
                        <label style="display:flex; align-items:center; gap:8px; margin:0; cursor:pointer;">
                            <input type="checkbox" id="ns-${t.tagId}" ${t.notify_scan !== false ? 'checked' : ''}>
                            Recibir aviso automático al ser escaneado
                        </label>
                        <label style="display:flex; align-items:center; gap:8px; margin:0; cursor:pointer;">
                            <input type="checkbox" id="nf-${t.tagId}" ${t.notify_form !== false ? 'checked' : ''}>
                            Recibir aviso al enviar datos por el formulario
                        </label>
                    </div>

                    <button class="btn-action btn-save" onclick="updateTag('${t.tagId}')">Guardar Cambios</button>
                    <div style="text-align:center; margin-top:12px;"><a href="https://sagason.cl/t/${t.tagId}" target="_blank" style="color:var(--primary); font-size:11px; text-decoration:none;">🔗 Probar Link Escaneo</a></div>
                </div>
            </div>`;
        }).join('');
    }

    async function payRAKA(tagId, plan, price, gateway) {
        const btn = event.target;
        btn.innerText = "Abriendo...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/create-preference`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tagId, planName: plan, price: price, email: userEmail, gateway: gateway })
            });

            if (!res.ok) throw new Error("Error en servidor al iniciar pago Flow");
            
            const data = await res.json();
            if (data.url) window.location.href = data.url;
            else {
                alert("No se pudo generar el link de pago en Flow.");
                console.error(data);
            }

        } catch (e) {
            alert("Error de conexión con la pasarela.");
            console.error(e);
            btn.innerText = "Reintentar Pago";
            btn.disabled = false;
        }
    }

    async function updateTag(tagId) {
        const payload = {
            ownerId, tagId, nickname: document.getElementById(`nick-${tagId}`).value,
            category: document.getElementById(`cat-${tagId}`).value,
            email_1: document.getElementById(`e1-${tagId}`).value, email_2: document.getElementById(`e2-${tagId}`).value, email_3: document.getElementById(`e3-${tagId}`).value,
            phone_1: document.getElementById(`p1-${tagId}`).value, phone_2: document.getElementById(`p2-${tagId}`).value, phone_3: document.getElementById(`p3-${tagId}`).value,
            thanks_msg: document.getElementById(`msg-${tagId}`).value,
            notify_scan: document.getElementById(`ns-${tagId}`).checked,
            notify_form: document.getElementById(`nf-${tagId}`).checked
        };
        const res = await fetch(`${API}/user-tags`, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload) 
        });
        if (res.ok) { alert("✅ Guardado"); loadTags(); }
    }

    function toggleEdit(id) {
        const area = document.getElementById(`edit-${id}`);
        const arrow = document.getElementById(`arrow-${id}`);
        const isVisible = area.style.display === "block";
        document.querySelectorAll('.edit-panel').forEach(a => a.style.display = "none");
        document.querySelectorAll('.arrow').forEach(a => a.classList.remove('up'));
        if (!isVisible) { area.style.display = "block"; arrow.classList.add('up'); }
    }

    let generatedBatch = []; // Para guardar datos del lote y comprimir

    // Generador de código aleatorio (PIN seguro de 6 caracteres ej. A7X9P2)
    function generatePin() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    async function adminCreateBatch() {
        const btn = document.getElementById('btn-admin-generate');
        const nickBase = document.getElementById('admin-nick').value || "SAGASON4K_Tag";
        const amount = parseInt(document.getElementById('admin-amount').value) || 1;
        
        btn.innerText = "Generando...";
        btn.disabled = true;
        
        const container = document.getElementById('qrs-container');
        container.innerHTML = "";
        generatedBatch = [];
        document.getElementById('qr-result').style.display = "block";

        for(let i = 0; i < amount; i++) {
            const sufijo = amount > 1 ? `_${i+1}` : '';
            const nickname = `${nickBase}${sufijo}`;
            const activationPIN = generatePin();

            try {
                const res = await fetch(`${API}/admin-create-tag`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: userEmail, nickname: nickname, activationCode: activationPIN }) 
                });
                
                if (res.ok) {
                    const data = await res.json();
                    
                    // -- Nuevo Flujo: Pedir el token encriptado para el QR --
                    const encryptRes = await fetch("https://s4k.sagason.cl/report", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'encrypt', tagId: data.tagId })
                    });
                    const encryptData = await encryptRes.json();
                    const secureToken = encryptData.token;
                    // ----------------------------------------------------
                    
                    // Contenedor visual del QR + Info
                    const itemDiv = document.createElement('div');
                    itemDiv.style.border = "1px solid #e2e8f0";
                    itemDiv.style.padding = "10px";
                    itemDiv.style.borderRadius = "8px";
                    itemDiv.style.background = "#f8fafc";
                    
                    const qrId = `qr-${Date.now()}-${i}`;
                    itemDiv.innerHTML = `
                        <div id="${qrId}" style="margin-bottom:8px; display:flex; justify-content:center;"></div>
                        <div style="font-size:11px; font-family:monospace; line-height:1.4;">
                            <strong>ID:</strong> ${data.tagId}<br>
                            <strong>PIN:</strong> ${activationPIN}
                        </div>
                    `;
                    container.appendChild(itemDiv);

                    // Generar QR dentro del div (usando token seguro cifrado en base64)
                    const qrcode = new QRCode(document.getElementById(qrId), { 
                        text: `https://sagason.cl/ayuda.html?token=${encodeURIComponent(secureToken)}`, 
                        width: 150, 
                        height: 150 
                    });

                    generatedBatch.push({
                        tagId: data.tagId,
                        pin: activationPIN,
                        filename: `${nickname}_${data.tagId}.png`,
                        qrElementId: qrId
                    });
                } else {
                    const errText = await res.text();
                    alert(`Error generando etiqueta ${i+1}: ${errText}`);
                    throw new Error(errText);
                }
            } catch(e) {
                console.error("Error creando en lote", e);
            }
        }
        
        btn.innerText = "Generar IDs, QRs y Códigos";
        btn.disabled = false;
    }

    async function downloadAllQRs() {
        if(generatedBatch.length === 0) {
            alert("No hay códigos para descargar. Debes generar al menos uno primero.");
            return;
        }
        
        try {
            const zip = new JSZip();
            let clavesTexto = `=== CÓDIGOS DE ACTIVACIÓN LOTE ===\n\n`;

            generatedBatch.forEach(item => {
                let base64Data = null;
                
                // Prioridad 1: Intentar extraer del canvas
                const canvas = document.querySelector(`#${item.qrElementId} canvas`);
                if(canvas) {
                    base64Data = canvas.toDataURL("image/png").split(',')[1];
                } else {
                    // Prioridad 2: Intentar extraer del img (si no soporta canvas)
                    const img = document.querySelector(`#${item.qrElementId} img`);
                    if(img && img.src && img.src.includes('base64,')) {
                        base64Data = img.src.split(',')[1];
                    }
                }

                if (base64Data) {
                    zip.file(item.filename, base64Data, {base64: true});
                    clavesTexto += `Archivo: ${item.filename}\r\nID Placa: ${item.tagId}\r\nPIN Activación: ${item.pin}\r\n\r\n-------------------\r\n\r\n`;
                }
            });

            // Agregamos el archivo de texto con las claves de seguridad
            zip.file("CLAVES_DE_ACTIVACION.txt", clavesTexto);

            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = `${document.getElementById('admin-nick').value || 'SAGASON4K'}_Lote_QRs.zip`;
            document.body.appendChild(link); // Firefox requiere que el elemento esté en el DOM para clickear
            link.click();
            document.body.removeChild(link); // Limpieza

        } catch(e) {
            alert("Ocurrió un error al intentar crear el .zip: " + e.message);
            console.error("Error comprimiendo archivo:", e);
        }
    }

    async function registerTag() {
        const tagId = document.getElementById('new-tag-id').value.trim();
        const pin = document.getElementById('new-tag-pin').value.trim();
        const nickname = document.getElementById('new-tag-nickname').value.trim();
        const category = document.getElementById('new-tag-category').value;
        const res = await fetch(`${API}/user-tags`, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ownerId, tagId, activationCode: pin, nickname, category, email_1: userEmail }) 
        });
        if (res.ok) { alert("¡Producto Vinculado!"); location.reload(); }
        else alert("ID No existe o ya está registrado.");
    }

    function logout() { localStorage.removeItem('sagason_token'); location.href="https://sagason.cl"; }
    init();
</script>
