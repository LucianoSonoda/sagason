<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagason - Gestión de Placas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        
        /* Estilo de la Lista de Placas */
        .tag-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 10px; margin-bottom: 15px; overflow: hidden; transition: 0.3s; }
        .tag-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #f8f9fa; }
        .tag-header:hover { background: #edf2f7; }
        .tag-info b { font-size: 16px; color: #2d3748; }
        .tag-info span { font-size: 12px; color: #718096; display: block; }

        /* Formulario de edición dentro de la placa */
        .tag-edit-area { display: none; padding: 20px; border-top: 1px solid #e1e4e8; background: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        label { display: block; margin-top: 10px; font-size: 13px; font-weight: bold; color: #4a5568; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        
        button { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-logout { background: #e53e3e; color: white; padding: 8px 15px; }
        .btn-activate { background: #3182ce; color: white; width: 100%; padding: 12px; margin-top: 15px; }
        .btn-save { background: #38a169; color: white; padding: 10px 20px; margin-top: 20px; width: 100%; }
        .btn-test { font-size: 12px; color: #3182ce; text-decoration: none; border: 1px solid #3182ce; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="user-display" style="margin:0; font-size:18px;">Cargando...</h2>
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>

    <!-- SECCIÓN: ACTIVAR PLACA -->
    <div class="section">
        <h3>Activar Nueva Placa Física</h3>
        <input type="text" id="new-tag-id" placeholder="ID DE LA PLACA (Ej: 2UCAYZL)" style="text-transform:uppercase;">
        <input type="text" id="new-tag-nickname" placeholder="Nombre (Ej: Mi Perro, Mi Auto)">
        <select id="new-tag-category">
            <option value="Mascotas">Mascota</option>
            <option value="Personas">Persona</option>
            <option value="Equipos">Equipo</option>
        </select>
        <button class="btn-activate" onclick="registerTag()">Activar Producto</button>
    </div>

    <!-- SECCIÓN: MIS PLACAS -->
    <div class="section">
        <h3>Mis Placas Registradas</h3>
        <p style="font-size:13px; color:#666; margin-bottom:20px;">Haz clic en una placa para configurar sus contactos de emergencia independientes.</p>
        <div id="tags-list-container">Cargando...</div>
    </div>
</div>

<script>
    const API = "https://k.sagason.cl";
    let ownerId = null;
    let userEmail = "";

    function parseJwt(token) {
        try { return JSON.parse(window.atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); } catch (e) { return null; }
    }

    async function init() {
        const hash = new URLSearchParams(window.location.hash.substring(1));
        const token = hash.get('id_token') || localStorage.getItem('sagason_token');
        if (!token) { 
            window.location.href = "https://sa-east-1oldgkh5dt.auth.sa-east-1.amazoncognito.com/login?client_id=21upf33c48gca702vfdrf9aqji&response_type=token&scope=email+openid+phone+profile&redirect_uri=https://sagason.cl/dashboard"; 
            return; 
        }
        
        localStorage.setItem('sagason_token', token);
        const user = parseJwt(token);
        ownerId = user.sub;
        userEmail = user.email;
        document.getElementById('user-display').innerText = `Hola, ${userEmail.split('@')[0]}`;
        loadTags();
    }

    async function loadTags() {
        const container = document.getElementById('tags-list-container');
        try {
            const response = await fetch(`${API}/user-tags?ownerId=${ownerId}`);
            const tags = await response.json();
            
            if (!tags || tags.length === 0) {
                container.innerHTML = "<p style='color:grey;'>No tienes placas activas.</p>";
                return;
            }

            container.innerHTML = tags.map(t => `
                <div class="tag-card">
                    <div class="tag-header" onclick="toggleEdit('${t.tagId}')">
                        <div class="tag-info">
                            <b>${t.nickname}</b>
                            <span>ID: ${t.tagId} (${t.category})</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <a href="https://sagason.cl/t/${t.tagId}" target="_blank" class="btn-test" onclick="event.stopPropagation()">Probar</a>
                            <span id="arrow-${t.tagId}">▼</span>
                        </div>
                    </div>
                    <div class="tag-edit-area" id="edit-${t.tagId}">
                        <div class="grid">
                            <div>
                                <label>Emails de Alerta (1-3):</label>
                                <input type="email" id="e1-${t.tagId}" value="${t.email_1 || userEmail}" placeholder="Email Principal">
                                <input type="email" id="e2-${t.tagId}" value="${t.email_2 || ''}" placeholder="Email 2 (Opcional)">
                                <input type="email" id="e3-${t.tagId}" value="${t.email_3 || ''}" placeholder="Email 3 (Opcional)">
                            </div>
                            <div>
                                <label>Teléfonos (+569...):</label>
                                <input type="tel" id="p1-${t.tagId}" value="${t.phone_1 || ''}" placeholder="Teléfono Principal">
                                <input type="tel" id="p2-${t.tagId}" value="${t.phone_2 || ''}" placeholder="Teléfono 2">
                                <input type="tel" id="p3-${t.tagId}" value="${t.phone_3 || ''}" placeholder="Teléfono 3">
                            </div>
                        </div>
                        <button class="btn-save" onclick="updateTagConfig('${t.tagId}', '${t.nickname}', '${t.category}')">Guardar Contactos de esta Placa</button>
                    </div>
                </div>
            `).join('');
        } catch (e) { container.innerHTML = "Error al cargar placas."; }
    }

    function toggleEdit(tagId) {
        const area = document.getElementById(`edit-${tagId}`);
        const arrow = document.getElementById(`arrow-${tagId}`);
        const isVisible = area.style.display === "block";
        
        // Cerrar todos primero
        document.querySelectorAll('.tag-edit-area').forEach(a => a.style.display = "none");
        document.querySelectorAll('[id^="arrow-"]').forEach(a => a.innerText = "▼");

        if (!isVisible) {
            area.style.display = "block";
            arrow.innerText = "▲";
        }
    }

    async function updateTagConfig(tagId, nickname, category) {
        const payload = {
            ownerId, tagId, nickname, category,
            email_1: document.getElementById(`e1-${tagId}`).value,
            email_2: document.getElementById(`e2-${tagId}`).value,
            email_3: document.getElementById(`e3-${tagId}`).value,
            phone_1: document.getElementById(`p1-${tagId}`).value,
            phone_2: document.getElementById(`p2-${tagId}`).value,
            phone_3: document.getElementById(`p3-${tagId}`).value
        };

        try {
            const res = await fetch(`${API}/user-tags`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) alert("✅ Contactos actualizados para esta placa.");
            else alert("Error al guardar.");
        } catch (e) { alert("Error de red."); }
    }

    async function registerTag() {
        const tagId = document.getElementById('new-tag-id').value.toUpperCase().trim();
        const nickname = document.getElementById('new-tag-nickname').value.trim();
        const category = document.getElementById('new-tag-category').value;

        if (!tagId || !nickname) return alert("Completa los datos.");

        try {
            const res = await fetch(`${API}/user-tags`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ownerId, tagId, nickname, category, email_1: userEmail })
            });
            const result = await res.json();
            if (res.ok) {
                alert("✅ Placa activada exitosamente.");
                location.reload(); 
            } else alert("❌ " + result.error);
        } catch (e) { alert("Error."); }
    }

    function logout() { localStorage.removeItem('sagason_token'); window.location.href = "https://sagason.cl"; }
    init();
</script>
</body>
</html>
