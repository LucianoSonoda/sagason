<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagason - Mi Panel</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .user-info { font-weight: bold; color: #2c3e50; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-info" id="user-email">Cargando...</div>
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div id="tags-section" style="margin-top: 30px;">
        <h3>Mis Placas Registradas</h3>
        <div id="tags-list-container" style="background:#fff; border:1px solid #ddd; padding:10px; border-radius:8px;">
            Cargando tus placas...
        </div>

        <h4 style="margin-top:20px;">Registrar Nueva Placa</h4>
        <div style="display:flex; gap:10px;">
            <input type="text" id="new-tag-nickname" placeholder="Nombre (ej: Maleta Azul)" style="flex: 2;">
            <select id="new-tag-category" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <option value="Mascotas">Mascota</option>
                <option value="Personas">Persona</option>
                <option value="Equipos">Equipo</option>
            </select>
            <button onclick="registerTag()" style="background:#3498db; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; flex: 1;">Registrar</button>
        </div>
    </div>

    <div id="profile-section" style="margin-top: 30px; display:none;">
        <h3>Configuración de Alertas</h3>
        <form id="profileForm">
            <label>Correos de Alerta (1-3):</label>
            <input type="email" id="email_1" placeholder="Correo Principal (Gratis)" required>
            <input type="email" id="email_2" placeholder="Correo Secundario (Avanzado)">
            <input type="email" id="email_3" placeholder="Correo de Respaldo (Avanzado)">
    
            <label style="margin-top:15px; display:block;">Teléfonos de Alerta (WhatsApp/SMS):</label>
            <input type="tel" id="phone_1" placeholder="Teléfono Principal (Básico)">
            <input type="tel" id="phone_2" placeholder="Teléfono Secundario (Avanzado)">
            <input type="tel" id="phone_3" placeholder="Teléfono de Respaldo (Avanzado)">
    
            <button type="submit" style="background:#2ecc71; color:white; border:none; padding:10px; width:100%; margin-top:20px; border-radius:5px; cursor:pointer;">Guardar Configuración</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://k.sagason.cl";
    let ownerId = null;

    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        } catch (e) { return null; }
    }

    async function initDashboard() {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        let idToken = hashParams.get('id_token') || localStorage.getItem('sagason_id_token');

        if (!idToken) {
            window.location.href = "https://sa-east-1oldgkh5dt.auth.sa-east-1.amazoncognito.com/login?client_id=21upf33c48gca702vfdrf9aqji&response_type=token&scope=email+openid+phone+profile&redirect_uri=https://sagason.cl/dashboard";
            return;
        }

        localStorage.setItem('sagason_id_token', idToken);
        const userData = parseJwt(idToken);
        ownerId = userData.sub; 
        
        document.getElementById('user-email').innerText = `Hola, ${userData.email} ✅`;
        document.getElementById('profile-section').style.display = "block";

        // 1. Cargar Configuración de Alertas
        loadProfile(userData.email);
        
        // 2. Cargar Lista de Tags
        loadTags();
    }

    async function loadProfile(defaultEmail) {
        try {
            const response = await fetch(`${API_URL}/user-config?ownerId=${ownerId}`);
            const config = await response.json();
            if (config) {
                document.getElementById('email_1').value = config.email_1 || defaultEmail;
                document.getElementById('email_2').value = config.email_2 || "";
                document.getElementById('email_3').value = config.email_3 || "";
                document.getElementById('phone_1').value = config.phone_1 || "";
                document.getElementById('phone_2').value = config.phone_2 || "";
                document.getElementById('phone_3').value = config.phone_3 || "";
            }
        } catch (e) { console.error("Error perfil:", e); }
    }

    async function loadTags() {
        const container = document.getElementById('tags-list-container');
        try {
            const response = await fetch(`${API_URL}/user-tags?ownerId=${ownerId}`);
            const tags = await response.json();
            
            if (!tags || tags.length === 0) {
                container.innerHTML = "<p style='color:grey;'>No tienes placas registradas.</p>";
                return;
            }

            container.innerHTML = tags.map(t => `
                <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong>${t.nickname}</strong> (${t.category})<br>
                        <small style="color:#7f8c8d;">ID: ${t.tagId}</small>
                    </div>
                    <a href="https://sagason.cl/t/${t.tagId}" target="_blank" style="background:#eee; padding:5px; border-radius:4px; color:#333; text-decoration:none; font-size:11px;">Abrir Link</a>
                </div>
            `).join('');
        } catch (e) { 
            container.innerHTML = "Error al cargar placas.";
            console.error("Error tags:", e); 
        }
    }

    async function registerTag() {
        const nickname = document.getElementById('new-tag-nickname').value;
        const category = document.getElementById('new-tag-category').value;
        if (!nickname) return alert("Ponle un nombre a la placa");

        try {
            const response = await fetch(`${API_URL}/user-tags`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ownerId, nickname, category })
            });

            if (response.ok) {
                document.getElementById('new-tag-nickname').value = "";
                alert("✅ Placa registrada");
                loadTags(); // Recargar lista
            }
        } catch (e) { alert("Error al registrar"); }
    }

    // Manejar el guardado del perfil
    document.getElementById('profileForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Guardando...";
        try {
            const payload = {
                ownerId,
                email_1: document.getElementById('email_1').value,
                email_2: document.getElementById('email_2').value,
                email_3: document.getElementById('email_3').value,
                phone_1: document.getElementById('phone_1').value,
                phone_2: document.getElementById('phone_2').value,
                phone_3: document.getElementById('phone_3').value
            };
            await fetch(`${API_URL}/user-config`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert("✅ Guardado");
        } catch (e) { alert("Error"); }
        btn.innerText = "Guardar Configuración";
    };

    function logout() {
        localStorage.removeItem('sagason_id_token');
        window.location.href = "https://sagason.cl";
    }

    initDashboard();
</script>
</body>
</html>
