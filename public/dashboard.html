<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagason - Panel de Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        h1, h3 { margin: 0; color: #1a1a1a; }
        .section { margin-bottom: 40px; padding: 20px; background: #fafafa; border-radius: 8px; border: 1px solid #eaeaea; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .btn-main { background: #3498db; color: white; margin-top: 20px; }
        .btn-main:hover { background: #2980b9; }
        .btn-save { background: #27ae60; color: white; margin-top: 25px; }
        .btn-save:hover { background: #219150; }
        .btn-logout { background: #e74c3c; color: white; width: auto; padding: 8px 15px; }
        .tag-item { background: white; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tag-info b { color: #2c3e50; display: block; }
        .tag-info small { color: #7f8c8d; font-family: monospace; }
        .link-test { color: #3498db; text-decoration: none; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 id="user-display">Cargando...</h3>
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>

    <!-- SECCIÓN DE MIS PLACAS -->
    <div class="section">
        <h3>Mis Placas Registradas</h3>
        <div id="tags-list-container" style="margin-top:15px;">
            <p style="color:grey;">Cargando tus placas activas...</p>
        </div>
    </div>

    <!-- SECCIÓN DE ACTIVACIÓN -->
    <div class="section">
        <h3>Activar Nueva Placa Física</h3>
        <p style="font-size:13px; color:#666;">Ingresa el código ID que aparece grabado en tu placa Sagason.</p>
        <input type="text" id="new-tag-id" placeholder="ID DE LA PLACA (Ej: 2UCAYZL)" style="text-transform:uppercase; font-weight:bold; letter-spacing:1px;">
        <input type="text" id="new-tag-nickname" placeholder="Nombre (Ej: Mi Perro Firulais, Maleta Viaje)">
        <select id="new-tag-category">
            <option value="Mascotas">Mascota</option>
            <option value="Personas">Persona</option>
            <option value="Equipos">Equipo</option>
        </select>
        <button class="btn-main" onclick="registerTag()">Activar Producto</button>
    </div>

    <!-- SECCIÓN DE CONFIGURACIÓN DE ALERTAS -->
    <div class="section">
        <h3>Configuración de Alertas</h3>
        <form id="profileForm">
            <label>Correo Principal (Gratis):</label>
            <input type="email" id="email_1" required>
            <label>Correos Secundarios (Plan Avanzado):</label>
            <input type="email" id="email_2" placeholder="Opcional">
            <input type="email" id="email_3" placeholder="Opcional">

            <label>Teléfonos de Alerta (Formato: +569...):</label>
            <input type="tel" id="phone_1" placeholder="Teléfono Principal">
            <input type="tel" id="phone_2" placeholder="Opcional">
            <input type="tel" id="phone_3" placeholder="Opcional">

            <button type="submit" class="btn-save">Guardar Cambios</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://k.sagason.cl";
    let ownerId = null;

    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        } catch (e) { return null; }
    }

    async function initDashboard() {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        let idToken = hashParams.get('id_token') || localStorage.getItem('sagason_id_token');

        if (!idToken) {
            window.location.href = "https://sa-east-1oldgkh5dt.auth.sa-east-1.amazoncognito.com/login?client_id=21upf33c48gca702vfdrf9aqji&response_type=token&scope=email+openid+phone+profile&redirect_uri=https://sagason.cl/dashboard";
            return;
        }

        localStorage.setItem('sagason_id_token', idToken);
        const userData = parseJwt(idToken);
        ownerId = userData.sub; 
        
        document.getElementById('user-display').innerText = `Hola, ${userData.email.split('@')[0]}`;
        
        loadProfile(userData.email);
        loadTags();
    }

    async function loadProfile(defaultEmail) {
        try {
            const response = await fetch(`${API_URL}/user-config?ownerId=${ownerId}`);
            const config = await response.json();
            if (config) {
                document.getElementById('email_1').value = config.email_1 || defaultEmail;
                document.getElementById('email_2').value = config.email_2 || "";
                document.getElementById('email_3').value = config.email_3 || "";
                document.getElementById('phone_1').value = config.phone_1 || "";
                document.getElementById('phone_2').value = config.phone_2 || "";
                document.getElementById('phone_3').value = config.phone_3 || "";
            }
        } catch (e) { console.error("Error perfil:", e); }
    }

    async function loadTags() {
        const container = document.getElementById('tags-list-container');
        try {
            const response = await fetch(`${API_URL}/user-tags?ownerId=${ownerId}`);
            const tags = await response.json();
            
            if (!tags || tags.length === 0) {
                container.innerHTML = "<p style='color:grey; font-size:14px;'>No tienes placas activas.</p>";
                return;
            }

            container.innerHTML = tags.map(t => `
                <div class="tag-item">
                    <div class="tag-info">
                        <b>${t.nickname}</b>
                        <small>ID: ${t.tagId} (${t.category})</small>
                    </div>
                    <a href="https://sagason.cl/t/${t.tagId}" target="_blank" class="link-test">Probar Escaneo</a>
                </div>
            `).join('');
        } catch (e) { 
            container.innerHTML = "Error al conectar con el servidor.";
        }
    }

    async function registerTag() {
        const tagIdInput = document.getElementById('new-tag-id');
        const nicknameInput = document.getElementById('new-tag-nickname');
        const category = document.getElementById('new-tag-category').value;

        const tagId = tagIdInput.value.toUpperCase().trim();
        const nickname = nicknameInput.value.trim();

        if (!tagId || !nickname) return alert("Por favor completa el ID de la placa y el nombre.");

        try {
            const response = await fetch(`${API_URL}/user-tags`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ownerId, tagId, nickname, category })
            });

            const result = await response.json();

            if (response.ok) {
                alert("✅ ¡Placa activada con éxito!");
                tagIdInput.value = "";
                nicknameInput.value = "";
                loadTags();
            } else {
                alert("❌ " + (result.error || "Error al activar"));
            }
        } catch (e) { alert("Error de red al intentar activar la placa."); }
    }

    document.getElementById('profileForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Guardando...";
        try {
            const payload = {
                ownerId,
                email_1: document.getElementById('email_1').value,
                email_2: document.getElementById('email_2').value,
                email_3: document.getElementById('email_3').value,
                phone_1: document.getElementById('phone_1').value,
                phone_2: document.getElementById('phone_2').value,
                phone_3: document.getElementById('phone_3').value
            };
            await fetch(`${API_URL}/user-config`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert("✅ Configuración guardada correctamente.");
        } catch (e) { alert("Error al guardar la configuración."); }
        btn.innerText = "Guardar Cambios";
    };

    function logout() {
        localStorage.removeItem('sagason_id_token');
        window.location.href = "https://sagason.cl";
    }

    initDashboard();
</script>
</body>
</html>
