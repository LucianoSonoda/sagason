<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagason - Mi Panel</title>
    <style>
        :root { --primary: #0ea5e9; --bg-dark: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 650px; margin: 20px auto; padding: 0 15px 80px 15px; }
        header { background: rgba(15, 23, 42, 0.9); padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .tabs { display: flex; background: var(--card-bg); padding: 4px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #94a3b8; font-weight: 600; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; } .content-section.active { display: block; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .tag-item { background: #0f172a; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; }
        .tag-header { padding: 16px; display: flex; justify-content: space-between; cursor: pointer; }
        .edit-panel { padding: 20px; background: #1e293b; border-top: 1px solid var(--border); display: none; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 14px; margin-top: 25px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-save { background: #10b981; color: white; }
    </style>
</head>
<body>

<header>
    <img src="logo-chico.png" height="35" onerror="this.src='https://sagason.cl/images/logo.png'">
    <button onclick="logout()" style="background:none; border:1px solid var(--border); color:white; padding:5px 10px; border-radius:5px;">Salir</button>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-list" onclick="showTab('list')">Mis Placas</button>
        <button class="tab-btn" id="btn-activate" onclick="showTab('activate')">Activar Nueva</button>
    </div>

    <div class="content-section active" id="section-list">
        <div id="tags-list-container">Cargando...</div>
    </div>

    <div class="content-section" id="section-activate">
        <div class="card">
            <h3>Vincular Producto</h3>
            <label>ID de Placa:</label>
            <input type="text" id="new-tag-id" placeholder="EJ: 2UCAYZL" style="text-transform:uppercase;">
            <label>Nombre:</label>
            <input type="text" id="new-tag-nickname" placeholder="Ej: Mi Perro">
            <label>Categoría:</label>
            <select id="new-tag-category">
                <option value="Mascotas">Mascota</option>
                <option value="Personas">Persona</option>
                <option value="Equipos">Equipo</option>
            </select>
            <button class="btn-action btn-confirm" onclick="registerTag()">Activar</button>
        </div>
    </div>
</div>

<script>
    const API = "https://k.sagason.cl";
    let ownerId = null;
    let userEmail = "";

    function showTab(n) { 
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`section-${n}`).classList.add('active');
        document.getElementById(`btn-${n}`).classList.add('active');
    }

    async function init() {
        const hash = new URLSearchParams(window.location.hash.substring(1));
        const token = hash.get('id_token') || localStorage.getItem('sagason_token');
        if (!token) { window.location.href = "https://sa-east-1oldgkh5dt.auth.sa-east-1.amazoncognito.com/login?client_id=21upf33c48gca702vfdrf9aqji&response_type=token&scope=email+openid+phone+profile&redirect_uri=https://sagason.cl/dashboard"; return; }
        localStorage.setItem('sagason_token', token);
        const user = JSON.parse(window.atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        ownerId = user.sub; userEmail = user.email;
        loadTags();
    }

    async function loadTags() {
        try {
            const res = await fetch(`${API}/user-tags?ownerId=${ownerId}`);
            const tags = await res.json();
            const cont = document.getElementById('tags-list-container');
            if (!tags || tags.length === 0) {
                cont.innerHTML = "<p style='text-align:center; color:#94a3b8;'>No tienes placas registradas.</p>";
                return;
            }
            cont.innerHTML = tags.map(t => `
                <div class="tag-item">
                    <div class="tag-header" onclick="toggleEdit('${t.tagId}')">
                        <b>${t.nickname}</b>
                        <span id="arrow-${t.tagId}">▼</span>
                    </div>
                    <div class="edit-panel" id="edit-${t.tagId}">
                        <label>Email Notificación:</label>
                        <input type="email" id="e1-${t.tagId}" value="${t.email_1 || userEmail}">
                        <label>Teléfono (+569...):</label>
                        <input type="tel" id="p1-${t.tagId}" value="${t.phone_1 || ''}">
                        <label>Mensaje de Agradecimiento:</label>
                        <textarea id="msg-${t.tagId}" rows="3" placeholder="Mensaje que verá quien encuentre tu tag...">${t.thanks_msg || ''}</textarea>
                        <button class="btn-action btn-save" onclick="updateTag('${t.tagId}', '${t.nickname}', '${t.category}')">Guardar</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('tags-list-container').innerHTML = "<p style='text-align:center;'>Error al cargar placas.</p>";
        }
    }

    function toggleEdit(id) {
        const area = document.getElementById(`edit-${id}`);
        const isVisible = area.style.display === "block";
        document.querySelectorAll('.edit-panel').forEach(a => a.style.display = "none");
        if (!isVisible) area.style.display = "block";
    }

    async function updateTag(tagId, nickname, category) {
        const payload = {
            ownerId, tagId, nickname, category,
            email_1: document.getElementById(`e1-${tagId}`).value,
            phone_1: document.getElementById(`p1-${tagId}`).value,
            thanks_msg: document.getElementById(`msg-${tagId}`).value
        };
        const res = await fetch(`${API}/user-tags`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload) 
        });
        if (res.ok) alert("✅ Guardado");
    }

    async function registerTag() {
        const tagId = document.getElementById('new-tag-id').value.toUpperCase().trim();
        const nickname = document.getElementById('new-tag-nickname').value.trim();
        const category = document.getElementById('new-tag-category').value;
        const res = await fetch(`${API}/user-tags`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ownerId, tagId, nickname, category, email_1: userEmail }) 
        });
        if (res.ok) location.reload(); else alert("ID No existe");
    }

    function logout() { localStorage.removeItem('sagason_token'); window.location.href = "https://sagason.cl"; }
    init();
</script>
</body>
</html>
