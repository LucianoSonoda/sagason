<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow"> <!-- Mayor privacidad, previene que se indexe en Google -->
    <title>Alerta de Emergencia Médica</title>
    
    <style>
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-secondary: #d1d5db;
            --primary-color: #ef4444; /* Rojo emergencia */
            --primary-hover: #dc2626;
            --success-color: #34d399;
            --error-color: #f87171;
            --info-color: #60a5fa;
            --border-color: #333333;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--bg-card);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: rgba(239, 68, 68, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            border: 2px solid var(--primary-color);
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: var(--primary-color);
        }

        h1 {
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 16px;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        p.description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 32px;
            color: var(--text-secondary);
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            background-color: #7f1d1d;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #status-message {
            margin-top: 24px;
            font-weight: 500;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            line-height: 1.4;
        }

        .status-content {
            padding: 12px 16px;
            border-radius: 8px;
            width: 100%;
        }

        .success .status-content {
            background-color: rgba(52, 211, 153, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .error .status-content {
            background-color: rgba(248, 113, 113, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .info .status-content {
            background-color: rgba(96, 165, 250, 0.1);
            color: var(--info-color);
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        /* SVG Loader Spinner */
        .spinner {
            animation: spin 1s linear infinite;
            width: 20px;
            height: 20px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <!-- Icono médico cruz/corazón/SOS -->
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    
    <h1>Emergencia Médica</h1>
    <p class="description">Has encontrado a alguien que necesita ayuda. Al pulsar el botón, enviarás tu ubicación actual y una alerta de emergencia a su familia de forma totalmente anónima.</p>
    
    <button id="btn-alerta" class="btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        Enviar Alerta
    </button>
    
    <div id="status-message"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const btnAlerta = document.getElementById('btn-alerta');
        const statusMessage = document.getElementById('status-message');
        
        // Función original de diseño del botón
        const originalBtnHTML = btnAlerta.innerHTML;

        // Recuperar el ID de la placa desde la URL (ej: /alerta-medica.html?id=PLA-12345)
        function getBadgeId() {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id') || urlParams.get('uid');
            
            // Fallback por si usan la URL como ruta base ej: /placa/PLA-12345
            if (!id) {
                const pathParts = window.location.pathname.split('/').filter(Boolean);
                if (pathParts.length > 0 && pathParts[pathParts.length - 1] !== 'alerta-medica.html') {
                    id = pathParts[pathParts.length - 1];
                }
            }
            return id || 'ID_NO_ESPECIFICADO';
        }

        const badgeId = getBadgeId();

        function setStatus(message, type) {
            statusMessage.innerHTML = `<div class="status-content">${message}</div>`;
            statusMessage.className = type;
        }

        function clearStatus() {
            statusMessage.innerHTML = '';
            statusMessage.className = '';
        }

        async function sendAlert(lat, lng) {
            // ✅ Endpoint real del Cloudflare Worker
            const ENDPOINT = "https://alerta-sos-sagason.brluson.workers.dev";
            
            // El payload debe coincidir exactamente con lo que espera el worker
            const payload = {
                lat: lat,
                lon: lng,
                plateId: badgeId,
                destinationEmail: "", // El worker usará ventas@sagason.cl si está vacío
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    setStatus('✅ Alerta enviada correctamente. Muchas gracias por su ayuda.', 'success');
                    btnAlerta.style.display = 'none'; // Evitar doble envío
                } else {
                    throw new Error(data.error || `Error del servidor: ${response.status}`);
                }
            } catch (error) {
                console.error("Error al enviar la alerta:", error);
                setStatus(`❌ No se pudo enviar la alerta. Por favor llame al 131. (${error.message})`, 'error');
                btnAlerta.disabled = false;
                btnAlerta.innerHTML = originalBtnHTML;
            }
        }

        btnAlerta.addEventListener('click', () => {
            clearStatus();
            btnAlerta.disabled = true;
            btnAlerta.innerHTML = `
                <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Obteniendo ubicación...
            `;
            setStatus('Por favor, autorice el acceso a la ubicación en su dispositivo...', 'info');

            if (!navigator.geolocation) {
                setStatus('Tu navegador no soporta la función de ubicación.', 'error');
                btnAlerta.disabled = false;
                btnAlerta.innerHTML = originalBtnHTML;
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    setStatus('Ubicación obtenida, enviando alerta...', 'info');
                    btnAlerta.innerHTML = `
                        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Enviando...
                    `;
                    sendAlert(latitude, longitude);
                },
                (error) => {
                    console.error("Geolocalización error:", error);
                    let errMsg = 'Ocurrió un error al obtener la ubicación.';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errMsg = 'Se denegó el permiso. Es necesario acceder a la ubicación para guiar a la familia.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errMsg = 'No se pudo determinar tu ubicación momentáneamente.';
                            break;
                        case error.TIMEOUT:
                            errMsg = 'El dispositivo tardó demasiado en responder la ubicación.';
                            break;
                    }
                    setStatus(errMsg, 'error');
                    btnAlerta.disabled = false;
                    btnAlerta.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"></path><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> Reintentar';
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });
    });
</script>
</body>
</html>
